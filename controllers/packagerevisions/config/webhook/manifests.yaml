---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: porch-controllers
      namespace: porch-system
      path: /validate-porch-kpt-dev-v1alpha2-packagerevision
      port: 9443
  failurePolicy: Fail
  name: packagerevision-validator.porch.kpt.dev
  rules:
  - apiGroups:
    - porch.kpt.dev
    apiVersions:
    - v1alpha2
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - packagerevisions
  sideEffects: None
  timeoutSeconds: 30
