baseURL = '/'
Locale = 'en-us'
title = 'Porch Documentation'

# based on https://www.docsy.dev/docs/get-started/docsy-as-module/start-from-scratch/

# Language settings

contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = true

# Default: include everything
ignoreFiles = []

enableRobotsTXT = true

theme = ["github.com/google/docsy"]

# Will give values to .Lastmod etc.
enableGitInfo = true

# Comment out to enable taxonomies in Docsy
disableKinds = ["taxonomy"]

# Highlighting config
pygmentsFences = true
pygmentsUseClasses = false
pygmentsStyle = "tango"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        title = true
    [markup.goldmark.renderer.headingAnchor]
      enable = true
      prefix = ""
      suffix = ""
      plainID = true

  [markup.highlight]
    style = "tango"

[params]

copyright = "The kpt Authors"

site_description = "Porch is a Kubernetes-based package management system for KRM configuration packages stored in Git repositories. It consists of an aggregated API server and a set of controllers that handle repository synchronisation, package revision lifecycle, rendering, and automation (PackageVariant/PackageVariantSet). Porch exposes package operations as Kubernetes resources, enabling GitOps workflows with approval gates, automated fan-out, and multi-repository collaboration."

#privacy_policy = ""

code_of_conduct = "https://lfprojects.org/policies/code-of-conduct/"

# Menu title if your navbar has a versions selector to access old versions of your site.
# This menu appears only if you have at least one [params.versions] set.

version_menu = "Releases"

# Flag used in the "version-banner" partial to decide whether to display a 
# banner on every page indicating that this is an archived version of the docs.
# Set this flag to "true" if you want to display the banner.

archived_version = false

# The version number for the version of the docs represented in this doc set.
# Used in the "version-banner" partial to display a version number for the 
# current doc set.

version = "latest"

# The version of the latest code build
latestTag = "1.5.7"

# latest tested versions
version_docker = "v28.1.1"
version_go = "v1.25.3"
version_git = "v2.51.2"
version_kind = "v0.30.0"
version_kube = "v1.34.2"
version_kpt = "v1.0.0-beta.62.1"

# A link to latest version of the docs. Used in the "version-banner" partial to
# point people to the main doc site.

url_latest_version = "/"

# Repository configuration (URLs for in-page links to opening issues and suggesting changes)

github_repo = "https://github.com/kptdev/porch"

# An optional link to a related project repo. For example, the sibling repository where your product code lives.

github_project_repo = "https://github.com/kptdev/porch/tree/main/docs"

# Specify a value here if your content directory is not in your repo's root directory

github_subdir = "docs"

time_format_blog = "Monday, January 02, 2006"
time_format_default = "January 2, 2006"

# Sections to publish in the main RSS feed.

rss_sections = ["blog"]

# Google Custom Search Engine ID. Remove or comment out to disable search.

#gcs_engine_id = ""

# Enable Algolia DocSearch

params.search.algolia = false

#Enable offline search with Lunr.js

offlineSearch = true
offlineSearchSummaryLength = 70
offlineSearchMaxResults = 10

# User interface configuration
[params.ui]
breadcrumb_disable = false
footer_about_disable = true
navbar_logo = true
navbar_translucent_over_cover_disable = false
sidebar_menu_compact = true
sidebar_search_disable = false

# Adds a H2 section titled "Feedback" to the bottom of each doc. The responses are sent to Google Analytics as events.
# This feature depends on [services.googleAnalytics] and will be disabled if "services.googleAnalytics.id" is not set.
# If you want this feature, but occasionally need to remove the "Feedback" section from a single page,
# add "hide_feedback: true" to the page's front matter.

[params.ui.feedback]

enable = false

# The responses that the user sees after clicking "yes" (the page was helpful) or "no" (the page was not helpful).
# Update with your own repository and response text.

yes = 'Glad to hear it! Please <a href="https://github.com/kptdev/porch/issues/new">tell us how we can improve</a>.'
no = 'Sorry to hear that. Please <a href="https://github.com/kptdev/porch/issuesnew">tell us how we can improve</a>.'

# Adds a reading time to the top of each doc.
# If you want this feature, but occasionally need to remove the Reading time from a single page, 
# add "hide_readingtime: true" to the page's front matter

[params.ui.readingtime]

enable = false

