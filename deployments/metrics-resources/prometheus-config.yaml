global:
  scrape_native_histograms: true
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'porch'

scrape_configs:
  - job_name: 'porch-server'
    scrape_native_histograms: true
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['api.porch-system.svc.cluster.local:9464']
        labels:
          service: 'porch'

  - job_name: 'porch-controllers'
    scrape_native_histograms: true
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['porch-controllers.porch-system.svc.cluster.local:9464']
        labels:
          service: 'porch'

  - job_name: 'function-runner'
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['function-runner.porch-system.svc.cluster.local:9464']
        labels:
          service: 'function-runner'
          component: 'grpc-server'
          
  - job_name: 'postgres'
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['postgres-exporter.porch-monitoring.svc.cluster.local:9187']
        labels:
          service: 'porch'
          component: 'postgresql'

  # Container CPU/memory for porch-postgresql (and other porch-system pods).
  - job_name: 'kubernetes-cadvisor'
    honor_labels: true
    scrape_interval: 10s
    scrape_timeout: 10s
    scheme: https
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

  # Perf tests run on the host (go test) and expose OTel metrics on port 9095.
  # On kind/Linux, Prometheus inside the cluster reaches the host via the Docker bridge gateway.
  - job_name: 'porch-performance-tests'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['172.17.0.1:9095']
        labels:
          service: 'porch-perf-test'