kind: ServiceAccount
apiVersion: v1
metadata:
  name: porch-server
  namespace: porch-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porch-server
  namespace: porch-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: porch-server
  template:
    metadata:
      labels:
        app: porch-server
      annotations:
        profiles.grafana.com/service_name: porch-server
        profiles.grafana.com/cpu.scrape: "true"
        profiles.grafana.com/cpu.port_name: "pprof"
        profiles.grafana.com/memory.scrape: "true"
        profiles.grafana.com/memory.port_name: "pprof"
        profiles.grafana.com/goroutine.scrape: "true"
        profiles.grafana.com/goroutine.port_name: "pprof"
        profiles.grafana.com/block.scrape: "true"
        profiles.grafana.com/block.port_name: "pprof"
        profiles.grafana.com/mutex.scrape: "true"
        profiles.grafana.com/mutex.port_name: "pprof"
    spec:
      serviceAccountName: porch-server
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: webhook-certs
          emptyDir: {}
        - name: api-server-certs
          emptyDir: {}
      containers:
        - name: porch-server
          # Update image to the image of your porch apiserver build.
          image: ghcr.io/kptdev/porch-server:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 2Gi
          volumeMounts:
            - mountPath: /cache
              name: cache-volume
            - mountPath: /etc/webhook/certs
              name: webhook-certs
            - name: api-server-certs
              mountPath: /tmp/certs
          envFrom:
            - configMapRef:
                name: porch-db-config
            - secretRef:
                name: porch-db-secret
          env:
            - name: OTEL_SERVICE_NAME
              value: porch-server
            - name: CERT_STORAGE_DIR
              value: /etc/webhook/certs
            - name: GOOGLE_API_GO_EXPERIMENTAL_DISABLE_NEW_AUTH_LIB
              value: "true"
            - name: OTEL_METRICS_EXPORTER
              value: "prometheus"
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: 0.0.0.0
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: "9464" # Default value, showing for visibility
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://jaeger-otlp.porch-monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: grpc
            - name: PORCH_PPROF_PORT
              value: "8080"
          args:
            - --function-runner=function-runner:9445
            - --cache-directory=/cache
            - --db-push-drafts-to-git=false
            - --cert-dir=/tmp/certs
            - --secure-port=4443
            - --repo-operation-retry-attempts=3
            - --max-request-body-size=6291456 # Keep this in sync with function-runner's corresponding argument
            - --cache-type=db
            - --disable-admission-plugins=MutatingAdmissionPolicy # This can be enabled once kindest/node 1.36.1 is released
          ports:
            - containerPort: 9464
              name: metrics
              protocol: TCP
            - containerPort: 8080
              name: pprof
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 4443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4443
              scheme: HTTPS
            periodSeconds: 30
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4443
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5                            
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: porch-system
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 4443
      name: api
    - port: 8443
      protocol: TCP
      targetPort: 8443
      name: webhooks
    - port: 9464
      protocol: TCP
      targetPort: 9464
      name: metrics
    - port: 8080
      protocol: TCP
      targetPort: 8080
      name: pprof
  selector:
    app: porch-server
