kind: ServiceAccount
apiVersion: v1
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      serviceAccountName: pyroscope
      containers:
        - name: pyroscope
          image: docker.io/grafana/pyroscope:latest # kpt-set: ${pyroscope-image}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4040
              name: ingest
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}
spec:
  ports:
    - port: 4040
      protocol: TCP
      targetPort: 4040
      name: ingest
  selector:
    app: pyroscope

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: porch-monitoring # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: docker.io/grafana/alloy:latest # kpt-set: ${alloy-image}
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          ports:
            - containerPort: 12345
              name: http
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: porch-monitoring # kpt-set: ${namespace}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: porch-monitoring # kpt-set: ${namespace}
