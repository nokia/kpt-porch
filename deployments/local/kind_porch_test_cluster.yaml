kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: management
networking:
  apiServerAddress: 127.0.0.1
  apiServerPort: 31000
  podSubnet: 10.97.0.0/16
  serviceSubnet: 10.197.0.0/16
nodes:
- role: control-plane
  image: kindest/node:v1.35.1@sha256:05d7bcdefbda08b4e038f644c4df690cdac3fba8b06f8289f30e10026720a1ab
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiVersion: kubeadm.k8s.io/v1beta4
    apiServer:
      extraArgs:
        request-timeout: "300s"
  extraPortMappings:
  - containerPort: 30000 # Gitea NodePort
    hostPort: 3000
  - containerPort: 30001 # function-runner NodePort
    hostPort: 30001
  - containerPort: 30002 # Porch postgres NodePort
    hostPort: 5432
  extraMounts:
    - containerPath: /mnt/postgresql
      hostPath: /tmp/porch/postgresql
