apiVersion: v1
kind: Endpoints
metadata:
  annotations:
    config.kubernetes.io/target-path: 3-porch-server-endpoints.yaml
  name: api
  namespace: porch-system
subsets:
- addresses:
  # This placeholder IP is overwritten dynamically by remove-porch-server-from-deployment-config.sh
  # using: docker network inspect bridge --format='{{(index .IPAM.Config 0).Gateway}}'
  - ip: 0.0.0.0
  ports:
  - appProtocol: https
    name: api
    port: 4443
    protocol: TCP
  - name: webhooks
    port: 8443
    protocol: TCP
