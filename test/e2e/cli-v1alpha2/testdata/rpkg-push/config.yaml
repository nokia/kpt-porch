usesPorchTestRepo: true
commands:
  - args:
      - porchctl
      - repo
      - register
      - --namespace=rpkg-push
      - --name=git
      - --v1alpha2
      - --repo-basic-password=secret
      - --repo-basic-username=porch
      - http://gitea.gitea.svc.cluster.local:3000/porch/porch-test
  - args:
      - porchctl
      - rpkg
      - init
      - --api-version=v1alpha2
      - --namespace=rpkg-push
      - --repository=git
      - --workspace=push
      - test-package
    stdout: |
      git.test-package.push created
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - pull
      - --api-version=v1alpha2
      - --namespace=rpkg-push
      - git.test-package.push
    stdout: |
      apiVersion: config.kubernetes.io/v1
      items:
      - apiVersion: ""
        kind: KptRevisionMetadata
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/path: .KptRevisionMetadata
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: .KptRevisionMetadata
          name: git.test-package.push
          namespace: rpkg-push
      - apiVersion: kpt.dev/v1
        info:
          description: sample description
        kind: Kptfile
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/local-config: "true"
            config.kubernetes.io/path: Kptfile
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: Kptfile
          name: test-package
        status:
          conditions:
          - reason: RenderSuccess
            status: "True"
            type: Rendered
      - apiVersion: v1
        data:
          name: example
        kind: ConfigMap
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/local-config: "true"
            config.kubernetes.io/path: package-context.yaml
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: package-context.yaml
          name: kptfile.kpt.dev
      kind: ResourceList
    yaml: true
  - args:
      - porchctl
      - rpkg
      - pull
      - --api-version=v1alpha2
      - --namespace=rpkg-push
      - git.test-package.push
      - /tmp/porch-e2e/rpkg-push-git.test-package.push
  - args:
      - kpt
      - fn
      - eval
      - --image
      - ghcr.io/kptdev/krm-functions-catalog/search-replace:v0.2.3
      - --match-kind
      - Kptfile
      - /tmp/porch-e2e/rpkg-push-git.test-package.push
      - --
      - by-path=info.description
      - put-value=Updated Test Package Description
    stderr: |
      [RUNNING] "ghcr.io/kptdev/krm-functions-catalog/search-replace:v0.2.3" on 1 resource(s)
        Results:
          [info] info.description: Mutated field value to "Updated Test Package Description"
  - args:
      - porchctl
      - rpkg
      - push
      - --api-version=v1alpha2
      - --namespace=rpkg-push
      - git.test-package.push
      - /tmp/porch-e2e/rpkg-push-git.test-package.push
    stdout: |
      git.test-package.push pushed
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - pull
      - --api-version=v1alpha2
      - --namespace=rpkg-push
      - git.test-package.push
    stdout: |
      apiVersion: config.kubernetes.io/v1
      items:
      - apiVersion: ""
        kind: KptRevisionMetadata
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/path: .KptRevisionMetadata
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: .KptRevisionMetadata
          name: git.test-package.push
          namespace: rpkg-push
      - apiVersion: kpt.dev/v1
        info:
          description: Updated Test Package Description
        kind: Kptfile
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/local-config: "true"
            config.kubernetes.io/path: Kptfile
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: Kptfile
          name: test-package
        status:
          conditions:
          - reason: RenderSuccess
            status: "True"
            type: Rendered
      - apiVersion: v1
        data:
          name: example
        kind: ConfigMap
        metadata:
          annotations:
            config.kubernetes.io/index: "0"
            config.kubernetes.io/local-config: "true"
            config.kubernetes.io/path: package-context.yaml
            internal.config.kubernetes.io/index: "0"
            internal.config.kubernetes.io/path: package-context.yaml
          name: kptfile.kpt.dev
      kind: ResourceList
    yaml: true
