# Skip: In v1alpha2, rendering is server-side. The "unready" blueprint has a broken pipeline
# that causes server-side render failure. Unlike v1alpha1 where you could locally fix the
# status and push, v1alpha2 re-renders on push and the pipeline still fails.
# This test needs to be rewritten to fix the actual pipeline (not just status) before propose.
skip: "v1alpha2 server-side render - fixing status locally doesn't fix server-side render failure"
usesPorchTestRepo: true
commands:
  - args:
      - porchctl
      - repo
      - register
      - --namespace=rpkg-unready
      - --name=git
      - --v1alpha2
      - --repo-basic-password=secret
      - --repo-basic-username=porch
      - http://gitea.gitea.svc.cluster.local:3000/porch/porch-test
  - args:
      - porchctl
      - repo
      - register
      - --repo-basic-password=secret
      - --repo-basic-username=porch
      - http://gitea.gitea.svc.cluster.local:3000/porch/test-blueprints.git
      - --namespace=rpkg-unready
      - --name=test-blueprints
      - --v1alpha2
  # Clone the unready blueprint - it has a render failure by design
  - args:
      - porchctl
      - rpkg
      - clone
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - test-blueprints.unready.v1
      - --repository=git
      - --workspace=clone-1
      - unready-edit
    stdout: |
      git.unready-edit.clone-1 created
    waitForReady: true
  # Pull the package to local filesystem
  - args:
      - porchctl
      - rpkg
      - pull
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.clone-1
      - /tmp/porch-e2e/pkg-unready-git.unready-edit.clone-1
  # Fix the render status locally using kpt fn eval
  - args:
      - kpt
      - fn
      - eval
      - --image
      - ghcr.io/kptdev/krm-functions-catalog/search-replace:v0.2.3
      - --match-kind
      - Kptfile
      - /tmp/porch-e2e/pkg-unready-git.unready-edit.clone-1
      - --
      - by-path=status.conditions[0].status
      - put-value=True
    stderr: |
      [RUNNING] "ghcr.io/kptdev/krm-functions-catalog/search-replace:v0.2.3" on 1 resource(s)
        Results:
          [info] status.conditions[0].status: Mutated field value to "\"True\""
  # Push the fixed package - server-side render should now succeed
  - args:
      - porchctl
      - rpkg
      - push
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.clone-1
      - /tmp/porch-e2e/pkg-unready-git.unready-edit.clone-1
    stdout: |
      git.unready-edit.clone-1 pushed
    waitForReady: true
  # Now propose should succeed since the package is ready
  - args:
      - porchctl
      - rpkg
      - propose
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.clone-1
    stdout: |
      git.unready-edit.clone-1 proposed
    waitForReady: true
  # Approve should succeed
  - args:
      - porchctl
      - rpkg
      - approve
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.clone-1
    stdout: |
      git.unready-edit.clone-1 approved
    waitForPublished: true
  # Copy from the published package
  - args:
      - porchctl
      - rpkg
      - copy
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - --workspace=copy-2
      - git.unready-edit.clone-1
    stdout: |
      git.unready-edit.copy-2 created
    waitForReady: true
  # Propose and approve the copy
  - args:
      - porchctl
      - rpkg
      - propose
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.copy-2
    stdout: |
      git.unready-edit.copy-2 proposed
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - approve
      - --api-version=v1alpha2
      - --namespace=rpkg-unready
      - git.unready-edit.copy-2
    stdout: |
      git.unready-edit.copy-2 approved
    waitForPublished: true
