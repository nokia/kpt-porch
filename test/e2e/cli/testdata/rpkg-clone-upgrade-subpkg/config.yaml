      - porchctl
      - rpkg
      - approve
      - --namespace=rpkg-clone-upgrade-subpkg
      - git.upstream-package.second-cut
    stdout: |
      git.upstream-package.second-cut approved
  - args:
      - porchctl
      - rpkg
      - init
      - --namespace=rpkg-clone-upgrade-subpkg
      - --repository=git
      - --workspace=alpha
      - parent-with-subpackages
    stdout: |
      git.parent-with-subpackages.alpha created
  - args:
      - porchctl
      - rpkg
      - clone
      - --namespace=rpkg-clone-upgrade-subpkg
      - --subpackage-dir=subpackages/upstream-function
      - git.upstream-package.first-cut
      - git.parent-with-subpackages.alpha
    stdout: |
      subpackage cloned into directory "subpackages/upstream-function" in package revision "git.parent-with-subpackages.alpha"
  - args:
      - porchctl
      - rpkg
      - pull
      - --namespace=rpkg-clone-upgrade-subpkg
      - git.parent-with-subpackages.alpha
      - /tmp/porch-e2e/rpkg-clone-upgrade-subpkg
  - args:
      - sh
      - -c
      - ls "/tmp/porch-e2e/rpkg-clone-upgrade-subpkg/subpackages/upstream-function/Kptfile" >> /dev/null 2>&1 && echo "found subpackages/upstream-function/Kptfile"
    stdout: |
      found subpackages/upstream-function/Kptfile
  - args:
      - sh
      - -c
      - |
        grep -q "ref: upstream-package/v1" /tmp/porch-e2e/rpkg-clone-upgrade-subpkg/subpackages/upstream-function/Kptfile && echo "found reference upstream-package/v1 in subpackages/upstream-function/Kptfile"
    stdout: |
      found reference upstream-package/v1 in subpackages/upstream-function/Kptfile
  - args:
      - sh
      - -c
      - |
        rm -fr /tmp/porch-e2e/rpkg-clone-upgrade-subpkg
  - args:
      - porchctl
      - rpkg
      - clone
      - --namespace=rpkg-clone-upgrade-subpkg
      - --directory=package-examples/wordpress
      - --ref=v1.0.0-beta.64
      - --subpackage-dir=clone-remote/wordpress
