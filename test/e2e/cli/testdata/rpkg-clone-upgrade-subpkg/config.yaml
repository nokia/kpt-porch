usesPorchTestRepo: true
commands:
  - args:
      - porchctl
      - repo
      - register
      - --namespace=rpkg-clone-upgrade-subpkg
      - --name=git
      - --repo-basic-password=secret
      - --repo-basic-username=porch
      - http://gitea.gitea.svc.cluster.local:3000/porch/porch-test
  - args:
      - porchctl
      - rpkg
      - init
      - --namespace=rpkg-clone-upgrade-subpkg
      - --repository=git
      - --workspace=first-cut
      - upstream-package
    stdout: |
      git.upstream-package.first-cut created
  - args:
      - porchctl
      - rpkg
      - propose
      - --namespace=rpkg-clone-upgrade-subpkg
      - git.upstream-package.first-cut
    stdout: |
      git.upstream-package.first-cut proposed
  - args:
      - porchctl
      - rpkg
      - approve
      - --namespace=rpkg-clone-upgrade-subpkg
      - git.upstream-package.first-cut
    stdout: |
      git.upstream-package.first-cut approved
  - args:
      - porchctl
      - rpkg
      - copy
      - --namespace=rpkg-clone-upgrade-subpkg
      - --workspace=second-cut
      - git.upstream-package.first-cut
    stdout: |
      git.upstream-package.second-cut created
  - args:
      - porchctl
      - rpkg
      - propose
      - --namespace=rpkg-clone-upgrade-subpkg
      - git.upstream-package.second-cut
    stdout: |
      git.upstream-package.second-cut proposed
