apiVersion: v1
kind: Service
metadata:
  name: gitea-lb
  namespace: gitea
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
spec:
  type: LoadBalancer
  ports:
  - name: ssh
    port: 22
    targetPort: 22
    protocol: TCP
  - name: http
    port: 3000
    targetPort: 3000
    nodePort: 30000 # Should match the gitea nodes.extraPortMappings.containerPort on the Kind cluster
  selector:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
