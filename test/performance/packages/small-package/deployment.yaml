apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: default # kpt-set: ${namespace}
  labels:
    app: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: test-container
          image: nginx:latest # kpt-set: ${image}
