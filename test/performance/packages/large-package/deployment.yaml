apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: default # kpt-set: ${namespace}
  labels:
    app: dashboard-service
    environment: dev # kpt-set: ${environment}
    version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    managed-by: kpt
    app.kubernetes.io/name: dashboard-service
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: large-app
  annotations:
    app.kubernetes.io/managed-by: kpt
    app.kubernetes.io/part-of: large-app
    app.kubernetes.io/version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: /metrics
    deployment.kubernetes.io/revision: "1"
    description: Microservice deployment for dashboard-service
spec:
  replicas: 2 # kpt-set: ${replicas}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        environment: dev # kpt-set: ${environment}
        version: v1.0.0 # kpt-set: ${version}
        team: platform # kpt-set: ${team}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: large-app # kpt-set: ${app-name}
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - dashboard-service
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - application
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: dashboard-service
      initContainers:
        - name: init-config
          image: docker.io/busybox:1.35 # kpt-set: ${init-image}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Initializing dashboard-service..."
              echo "Environment: $APP_ENV"
              echo "Version: $APP_VERSION"
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is reachable. Init complete."
          env:
            - name: APP_ENV
              value: dev # kpt-set: ${environment}
            - name: APP_VERSION
              value: v1.0.0 # kpt-set: ${version}
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
        - name: init-migrations
          image: docker.io/busybox:1.35 # kpt-set: ${init-image}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - echo "Running schema migrations for dashboard-service..."
          env:
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
            - name: DB_NAME
              value: appdb # kpt-set: ${db-name}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
