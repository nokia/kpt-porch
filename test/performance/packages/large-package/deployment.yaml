            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: logs-dir
              mountPath: /var/log/app
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
              readOnly: true
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: large-app-config # kpt-set: ${app-name}-config
            defaultMode: 0440
        - name: envoy-config
          configMap:
            name: envoy-config
            defaultMode: 0440
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
            defaultMode: 0440
        - name: feature-flags
          configMap:
            name: feature-flags-config
            defaultMode: 0440
        - name: tls-certs
          secret:
            secretName: trace-collector-tls
            defaultMode: 0400
        - name: tmp-dir
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: logs-dir
          emptyDir:
            sizeLimit: 512Mi
      imagePullSecrets:
        - name: registry-credentials # kpt-set: ${image-pull-secret}
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      restartPolicy: Always
