          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Initializing order-service..."
              echo "Environment: $APP_ENV"
              echo "Version: $APP_VERSION"
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is reachable. Init complete."
          env:
            - name: APP_ENV
              value: dev # kpt-set: ${environment}
            - name: APP_VERSION
              value: v1.0.0 # kpt-set: ${version}
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
