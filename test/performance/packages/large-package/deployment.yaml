            - name: LOG_FORMAT
              value: json
            - name: METRICS_PORT
              value: "9090"
            - name: HEALTH_PORT
              value: "8081"
            - name: GRPC_PORT
              value: "9000"
            - name: ADMIN_PORT
              value: "8082"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
