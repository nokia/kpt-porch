      serviceAccountName: large-app # kpt-set: ${app-name}
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reporting-service
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - application
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: reporting-service
      initContainers:
        - name: init-config
          image: docker.io/busybox:1.35 # kpt-set: ${init-image}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Initializing reporting-service..."
              echo "Environment: $APP_ENV"
              echo "Version: $APP_VERSION"
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is reachable. Init complete."
          env:
            - name: APP_ENV
              value: dev # kpt-set: ${environment}
            - name: APP_VERSION
              value: v1.0.0 # kpt-set: ${version}
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
