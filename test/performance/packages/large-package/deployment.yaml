apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: default # kpt-set: ${namespace}
  labels:
    app: reporting-service
    environment: dev # kpt-set: ${environment}
    version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    managed-by: kpt
    app.kubernetes.io/name: reporting-service
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: large-app
  annotations:
    app.kubernetes.io/managed-by: kpt
    app.kubernetes.io/part-of: large-app
    app.kubernetes.io/version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: /metrics
    deployment.kubernetes.io/revision: "1"
    description: Microservice deployment for reporting-service
spec:
  replicas: 2 # kpt-set: ${replicas}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
        environment: dev # kpt-set: ${environment}
        version: v1.0.0 # kpt-set: ${version}
        team: platform # kpt-set: ${team}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
