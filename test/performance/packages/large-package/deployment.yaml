---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default # kpt-set: ${namespace}
  labels:
    app: api-gateway
    environment: dev # kpt-set: ${environment}
    version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    managed-by: kpt
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: large-app
  annotations:
    app.kubernetes.io/managed-by: kpt
    app.kubernetes.io/part-of: large-app
    app.kubernetes.io/version: v1.0.0 # kpt-set: ${version}
    team: platform # kpt-set: ${team}
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: /metrics
    deployment.kubernetes.io/revision: "1"
    description: Microservice deployment for api-gateway
spec:
  replicas: 2 # kpt-set: ${replicas}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        environment: dev # kpt-set: ${environment}
        version: v1.0.0 # kpt-set: ${version}
        team: platform # kpt-set: ${team}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: large-app # kpt-set: ${app-name}
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - application
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-gateway
      initContainers:
        - name: init-config
          image: docker.io/busybox:1.35 # kpt-set: ${init-image}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Initializing api-gateway..."
              echo "Environment: $APP_ENV"
              echo "Version: $APP_VERSION"
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for database at $DB_HOST:$DB_PORT..."
                sleep 2
              done
              echo "Database is reachable. Init complete."
          env:
            - name: APP_ENV
              value: dev # kpt-set: ${environment}
            - name: APP_VERSION
              value: v1.0.0 # kpt-set: ${version}
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
        - name: init-migrations
          image: docker.io/busybox:1.35 # kpt-set: ${init-image}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - echo "Running schema migrations for api-gateway..."
          env:
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
            - name: DB_NAME
              value: appdb # kpt-set: ${db-name}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      containers:
        - name: api-gateway
          image: docker.io/nginx:latest # kpt-set: ${image}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080 # kpt-set: ${port}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          env:
            - name: APP_NAME
              value: api-gateway
            - name: APP_ENV
              value: dev # kpt-set: ${environment}
            - name: APP_VERSION
              value: v1.0.0 # kpt-set: ${version}
            - name: APP_PORT
              value: "8080" # kpt-set: ${port}
            - name: LOG_LEVEL
              value: info # kpt-set: ${log-level}
            - name: LOG_FORMAT
              value: json
            - name: METRICS_PORT
              value: "9090"
            - name: HEALTH_PORT
              value: "8081"
            - name: GRPC_PORT
              value: "9000"
            - name: ADMIN_PORT
              value: "8082"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_HOST
              value: postgres-service # kpt-set: ${db-host}
            - name: DB_PORT
              value: "5432" # kpt-set: ${db-port}
            - name: DB_NAME
              value: appdb # kpt-set: ${db-name}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_SSL_MODE
              value: require
            - name: DB_MAX_OPEN_CONNS
              value: "25"
            - name: DB_MAX_IDLE_CONNS
              value: "5"
            - name: DB_CONN_MAX_LIFETIME
              value: 5m
            - name: REDIS_HOST
              value: redis-service # kpt-set: ${redis-host}
            - name: REDIS_PORT
              value: "6379" # kpt-set: ${redis-port}
            - name: REDIS_DB
              value: "0"
            - name: REDIS_POOL_SIZE
              value: "10"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: KAFKA_BROKERS
              value: kafka-service:9092 # kpt-set: ${kafka-brokers}
            - name: KAFKA_GROUP_ID
              value: api-gateway-group
            - name: KAFKA_AUTO_OFFSET_RESET
              value: earliest
            - name: KAFKA_MAX_POLL_RECORDS
              value: "500"
            - name: TRACING_ENDPOINT
              value: http://jaeger-collector:14268/api/traces # kpt-set: ${tracing-endpoint}
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_SAMPLE_RATE
              value: "0.1"
            - name: TRACING_SERVICE_NAME
              value: api-gateway
            - name: METRICS_ENABLED
              value: "true"
            - name: PROFILING_ENABLED
              value: "false"
            - name: RATE_LIMIT_RPS
              value: "100" # kpt-set: ${rate-limit}
            - name: TIMEOUT_SECONDS
              value: "30" # kpt-set: ${timeout}
            - name: MAX_CONNECTIONS
              value: "100"
            - name: TLS_ENABLED
              value: "true"
            - name: TLS_CERT_FILE
              value: /etc/tls/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/tls/tls.key
            - name: CORS_ORIGINS
              value: "*"
            - name: CORS_METHODS
              value: GET,POST,PUT,DELETE,OPTIONS
            - name: CORS_HEADERS
              value: Content-Type,Authorization,X-Request-ID
            - name: JWT_ISSUER
              value: large-app # kpt-set: ${app-name}
            - name: JWT_AUDIENCE
              value: large-app-users
            - name: JWT_EXPIRY
              value: 3600s
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8080
            - name: CONFIG_SERVICE_URL
              value: http://config-service:8080
            - name: DISCOVERY_SERVICE_URL
              value: http://discovery-service:8080
            - name: FEATURE_FLAGS_ENABLED
              value: "true"
            - name: CACHE_TTL_SECONDS
              value: "300"
            - name: SHUTDOWN_TIMEOUT_SECONDS
              value: "30"
            - name: MAX_REQUEST_BODY_SIZE
              value: "10485760"
            - name: GZIP_ENABLED
              value: "true"
            - name: KEEP_ALIVE_TIMEOUT
              value: "75s"
            - name: READ_TIMEOUT
              value: "30s"
            - name: WRITE_TIMEOUT
              value: "30s"
            - name: IDLE_TIMEOUT
              value: "120s"
          resources:
            requests:
              cpu: 100m # kpt-set: ${cpu-request}
              memory: 128Mi # kpt-set: ${memory-request}
            limits:
              cpu: 500m # kpt-set: ${cpu-limit}
              memory: 256Mi # kpt-set: ${memory-limit}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
              httpHeaders:
                - name: X-Health-Check
                  value: liveness
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
              httpHeaders:
                - name: X-Health-Check
                  value: readiness
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startupz
              port: 8081
              httpHeaders:
                - name: X-Health-Check
                  value: startup
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tmp-dir
              mountPath: /tmp
            - name: logs-dir
              mountPath: /var/log/app
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
            - name: feature-flags
              mountPath: /etc/feature-flags
              readOnly: true
        - name: envoy-proxy
          image: docker.io/envoyproxy/envoy:v1.28.0 # kpt-set: ${envoy-image}
          imagePullPolicy: IfNotPresent
          ports:
            - name: envoy-admin
              containerPort: 9901
              protocol: TCP
            - name: envoy-inbound
              containerPort: 15001
              protocol: TCP
            - name: envoy-outbound
              containerPort: 15002
              protocol: TCP
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info # kpt-set: ${log-level}
            - --drain-time-s
            - "30"
          env:
            - name: ENVOY_UID
              value: "0"
            - name: ENVOY_ADMIN_PORT
              value: "9901"
            - name: LOG_LEVEL
              value: info # kpt-set: ${log-level}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: api-gateway
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthcheck/fail
              port: 9901
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthcheck/ok
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tmp-dir
              mountPath: /tmp
        - name: log-shipper
          image: docker.io/fluent/fluent-bit:2.2 # kpt-set: ${fluentbit-image}
          imagePullPolicy: IfNotPresent
          ports:
            - name: fluent-http
              containerPort: 2020
              protocol: TCP
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: elasticsearch-service # kpt-set: ${elasticsearch-host}
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200" # kpt-set: ${elasticsearch-port}
            - name: FLUENT_ELASTICSEARCH_INDEX
              value: api-gateway-logs
            - name: FLUENT_ELASTICSEARCH_TYPE
              value: _doc
            - name: LOG_LEVEL
              value: info # kpt-set: ${log-level}
            - name: SERVICE_NAME
              value: api-gateway
            - name: ENVIRONMENT
              value: dev # kpt-set: ${environment}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: logs-dir
              mountPath: /var/log/app
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
              readOnly: true
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: large-app-config # kpt-set: ${app-name}-config
            defaultMode: 0440
        - name: envoy-config
          configMap:
            name: envoy-config
            defaultMode: 0440
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
            defaultMode: 0440
        - name: feature-flags
          configMap:
            name: feature-flags-config
            defaultMode: 0440
        - name: tls-certs
          secret:
            secretName: api-gateway-tls
            defaultMode: 0400
        - name: tmp-dir
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: logs-dir
          emptyDir:
            sizeLimit: 512Mi
      imagePullSecrets:
        - name: registry-credentials # kpt-set: ${image-pull-secret}
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      restartPolicy: Always
