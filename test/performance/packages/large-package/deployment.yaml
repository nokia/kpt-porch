            sizeLimit: 64Mi
        - name: logs-dir
          emptyDir:
            sizeLimit: 512Mi
      imagePullSecrets:
        - name: registry-credentials # kpt-set: ${image-pull-secret}
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      restartPolicy: Always
