apiVersion: v1
kind: LimitRange
metadata:
  name: large-app-limits
  namespace: default # kpt-set: ${namespace}
  labels:
    app.kubernetes.io/part-of: large-app
    managed-by: kpt
    team: platform # kpt-set: ${team}
  annotations:
    app.kubernetes.io/managed-by: kpt
    app.kubernetes.io/part-of: large-app
spec:
  limits:
    - type: Container
      default:
        cpu: 500m # kpt-set: ${cpu-limit}
        memory: 256Mi # kpt-set: ${memory-limit}
      defaultRequest:
        cpu: 100m # kpt-set: ${cpu-request}
        memory: 128Mi # kpt-set: ${memory-request}
      max:
        cpu: "2"
        memory: 1Gi
      min:
        cpu: 10m
        memory: 16Mi
    - type: Pod
      max:
        cpu: "8"
        memory: 4Gi
    - type: PersistentVolumeClaim
      max:
        storage: 10Gi
      min:
        storage: 1Gi

