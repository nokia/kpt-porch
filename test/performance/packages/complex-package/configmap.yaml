apiVersion: v1
kind: ConfigMap
metadata:
  name: complex-app-config # kpt-set: ${app-name}-config
  namespace: default # kpt-set: ${namespace}
  labels:
    app: complex-app # kpt-set: ${app-name}
    environment: dev # kpt-set: ${environment}
  annotations:
    app.kubernetes.io/managed-by: kpt
    team: platform # kpt-set: ${team}
data:
  APP_ENV: dev # kpt-set: ${environment}
  APP_PORT: "8080" # kpt-set: ${port}
  APP_NAME: complex-app # kpt-set: ${app-name}
  APP_VERSION: v1.0.0 # kpt-set: ${version}
  LOG_LEVEL: info
  METRICS_ENABLED: "true"

