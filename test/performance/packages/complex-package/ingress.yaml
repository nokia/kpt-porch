apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: complex-app # kpt-set: ${app-name}
  namespace: default # kpt-set: ${namespace}
  labels:
    app: complex-app # kpt-set: ${app-name}
    environment: dev # kpt-set: ${environment}
  annotations:
    app.kubernetes.io/managed-by: kpt
    team: platform # kpt-set: ${team}
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: complex-app.example.com # kpt-set: ${ingress-host}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: complex-app # kpt-set: ${app-name}
                port:
                  number: 8080 # kpt-set: ${port}
  tls:
    - hosts:
        - complex-app.example.com # kpt-set: ${ingress-host}
      secretName: complex-app-tls # kpt-set: ${app-name}-tls

